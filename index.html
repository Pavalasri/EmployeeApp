<!DOCTYPE html>
<html>
<head>
    <title>Employee Leave Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Employee Leave Tracker</h1>

    <form id="leaveForm">

        <label>Employee ID</label><br>
        <input type="text" id="empId" placeholder="Enter Employee ID" required><br>

        <label>Employee Name</label><br>
        <input type="text" id="name" placeholder="Enter Employee Name" required><br>

        <label>Leave Type</label><br>
        <select id="leaveType">
            <option value="All">All</option>
            <option value="Casual">Casual</option>
            <option value="Sick">Sick</option>
            <option value="Annual">Annual</option>
        </select>

        <label>From Date</label><br>
        <input type="date" id="fromDate" required><br>

        <label>To Date</label><br>
        <input type="date" id="toDate" required><br><br>

        <button type="submit">Apply Leave</button>

    </form>

    <table border="1">

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>From</th>
                <th>To</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

    <script src="script.js"></script>

</body>
</html>
